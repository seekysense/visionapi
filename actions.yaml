    - DO NOT include any text, explanations, or markdown formatting outside of the

    JSON block.


    - Output ONLY the raw JSON.



    Example of allowed description: ''Five individuals wearing winter coats, two holding

    black suitcases and one carrying a backpack.''

    '
- id: vehicle_count
  label: Vehicle Counting
  prompt_single: 'Analyze the provided image of the parking area. Count the total

    number of cars and trucks combined.


    Return your response strictly as a single JSON object with the following keys:


    - "number": (integer) The total count of cars and trucks only.


    - "confidence": (float between 0 and 1) Your confidence level in the count.


    - "describe": (string) A comprehensive list of ALL vehicles identified in the

    scene, including cars, trucks, bicycles, motorcycles, mopeds, and e-scooters.

    Describe them by color or type (e.g., ''three red cars, two delivery trucks, and

    one electric scooter near the entrance'').



    STRICT PROHIBITIONS:


    - DO NOT include any text, explanations, or markdown formatting outside of the

    JSON block.


    - Output ONLY the raw JSON.


    - Focus the count only on cars and trucks, but include all other vehicle types

    in the description.

    '
  prompt_sequence: 'Analyze the provided image of the parking area. Count the total

    number of cars and trucks combined.


    Return your response strictly as a single JSON object with the following keys:


    - "number": (integer) The total count of cars and trucks only.


    - "confidence": (float between 0 and 1) Your confidence level in the count.


    - "describe": (string) A comprehensive list of ALL vehicles identified in the

    scene, including cars, trucks, bicycles, motorcycles, mopeds, and e-scooters.

    Describe them by color or type (e.g., ''three red cars, two delivery trucks, and

    one electric scooter near the entrance'').



    STRICT PROHIBITIONS:


    - DO NOT include any text, explanations, or markdown formatting outside of the

    JSON block.


    - Output ONLY the raw JSON.


    - Focus the count only on cars and trucks, but include all other vehicle types

    in the description.

    '
- id: patio_check
  label: Verify Patio Objects
  prompt_single: "Analyze the provided image of the outdoor patio. Focus exclusively\
    \ on the light\ngreen metal dining table and the chairs, along with the immediate\
    \ gravel area\nsurrounding them.\n\nYour task is to determine if any items such\
    \ as bottles, glasses, crockery, or\nother tableware (abandoned or forgotten)\
    \ are present on the table surface or\nthe ground nearby.\n\nSTRICT OUTPUT RULES:\n\
    - Return your response strictly as a single, raw JSON object.\n- DO NOT include\
    \ any text, explanations, or markdown formatting outside of the JSON block.\n\
    - The JSON keys must be exactly: 'detected', 'confidence', 'describe'.\n\nFIELD\
    \ DEFINITIONS:\n- \"detected\": (boolean) true if any bottles, glasses, tableware,\
    \ or crockery are found. false otherwise.\n- \"confidence\": (float between 0\
    \ and 1) your confidence level in the detection (or lack thereof).\n- \"describe\"\
    : (string) a detailed description of all items found on the table surface and\n\
    the immediate gravel area. If no target items are present, the description must\
    \ state that\nthe area is clear.\n\nEXAMPLE OUTPUTS:\n- (If a bottle and a glass\
    \ are found on the table):\n  {\n    \"detected\": true,\n    \"confidence\":\
    \ 0.95,\n    \"describe\": \"A clear glass bottle and one drinking glass are visible\
    \ on the center of the table.\"\n  }\n- (If nothing is found):\n  {\n    \"detected\"\
    : false,\n    \"confidence\": 0.99,\n    \"describe\": \"The light green metal\
    \ dining table and the immediate gravel patio area are completely clear of bottles,\
    \ glasses, tableware, or other abandoned items.\"\n  }\n"
  prompt_sequence: "Analyze the provided image of the outdoor patio. Focus exclusively\
    \ on the light\ngreen metal dining table and the chairs, along with the immediate\
    \ gravel area\nsurrounding them.\n\nYour task is to determine if any items such\
    \ as bottles, glasses, crockery, or\nother tableware (abandoned or forgotten)\
    \ are present on the table surface or\nthe ground nearby.\n\nSTRICT OUTPUT RULES:\n\
    - Return your response strictly as a single, raw JSON object.\n- DO NOT include\
    \ any text, explanations, or markdown formatting outside of the JSON block.\n\
    - The JSON keys must be exactly: 'detected', 'confidence', 'describe'.\n\nFIELD\
    \ DEFINITIONS:\n- \"detected\": (boolean) true if any bottles, glasses, tableware,\
    \ or crockery are found. false otherwise.\n- \"confidence\": (float between 0\
    \ and 1) your confidence level in the detection (or lack thereof).\n- \"describe\"\
    : (string) a detailed description of all items found on the table surface and\n\
    the immediate gravel area. If no target items are present, the description must\
    \ state that\nthe area is clear.\n\nEXAMPLE OUTPUTS:\n- (If a bottle and a glass\
    \ are found on the table):\n  {\n    \"detected\": true,\n    \"confidence\":\
    \ 0.95,\n    \"describe\": \"A clear glass bottle and one drinking glass are visible\
    \ on the center of the table.\"\n  }\n- (If nothing is found):\n  {\n    \"detected\"\
    : false,\n    \"confidence\": 0.99,\n    \"describe\": \"The light green metal\
    \ dining table and the immediate gravel patio area are completely clear of bottles,\
    \ glasses, tableware, or other abandoned items.\"\n  }\n"
- id: cleaning_detection
  label: Cleaning Equipment & Activity Detection
  prompt_single: 'Analyze the provided indoor image to detect cleaning activities
    or the presence

    of cleaning equipment.


    Return your response strictly as a single JSON object with the following keys:


    - "cleaning_detected": (boolean) true if cleaning tools or activities are visible,

    false otherwise.


    - "confidence": (float between 0 and 1) Your confidence level based on the visibility

    of specific tools.


    - "tools_found": (array of strings) List the specific items detected (e.g., ''mop'',

    ''cleaning cart'', ''spray bottle'', ''broom'', ''wet floor sign'', ''microfiber
    cloth'').


    - "describe": (string) A concise description of the cleaning setup, focusing exclusively

    on the equipment and its placement within the area.



    STRICT PROHIBITIONS:


    - DO NOT mention the identity, gender, age, or physical characteristics of any

    people present.


    - DO NOT include any text, explanations, or markdown formatting outside of the

    JSON block.


    - Output ONLY the raw JSON.



    Example of allowed description: ''A yellow cleaning cart equipped with multiple

    spray bottles and a mop bucket, positioned next to a wet floor sign.''

    '
  prompt_sequence: 'Analyze the provided indoor image to detect cleaning activities
    or the presence

