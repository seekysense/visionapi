- id: buffet_setup_detection
  label: Buffet & Catering Detection
  prompt_single: "Analyze the provided image to identify if a buffet counter or a\
    \ table set up\nfor a meal (breakfast or lunch) is present.\n\nReturn your response\
    \ strictly as a single JSON object with the following keys:\n\n- \"buffet_detected\"\
    : (boolean) True ONLY if the counter features a professional-grade,\nhigh-density\
    \ food setup. To be True, the following conditions must be met simultaneously:\n\
    \  1. Multiple professional serving vessels are present (e.g., chafing dishes,\
    \ tiered\n     risers, warming trays).\n  2. There is a clear variety of different\
    \ food categories (e.g., savory, sweet,\n     fruits, beverages).\n  3. High spatial\
    \ density, where the arrangement covers the vast majority (at least\n     70%)\
    \ of the table or counter surface.\nSet to False if only isolated items are present\
    \ (e.g., a single fruit bowl, a lone\ntray), a coffee station, or a dessert-only\
    \ display.\n\n- \"confidence\": (float between 0 and 1) Your confidence level\
    \ based on the presence\nof food and tableware.\n\n- \"items_found\": (array of\
    \ strings) List the specific elements detected (e.g.,\n'food platters', 'trays',\
    \ 'bottles', 'cutlery', 'plates', 'carafes', 'chafing dishes').\n\n- \"describe\"\
    : (string) A concise description of the setup, focusing on the arrangement\nof\
    \ food, beverages, and serving equipment.\n\n\nSTRICT PROHIBITIONS:\n\n- DO NOT\
    \ mention any people present, their identity, or physical characteristics.\n\n\
    - DO NOT include any text, explanations, or markdown formatting outside of the\n\
    JSON block.\n\n- Output ONLY the raw JSON.\n\n\nExample of allowed description:\
    \ 'A long table arranged with several stainless\nsteel warming trays, stacks of\
    \ ceramic plates, and various glass bottles of water\nand juice.'\n"
  prompt_sequence: "Analyze the provided image to identify if a buffet counter or\
    \ a table set up\nfor a meal (breakfast or lunch) is present.\n\nReturn your response\
    \ strictly as a single JSON object with the following keys:\n\n- \"buffet_detected\"\
    : (boolean) True ONLY if the counter features a professional-grade,\nhigh-density\
    \ food setup. To be True, the following conditions must be met simultaneously:\n\
    \  1. Multiple professional serving vessels are present (e.g., chafing dishes,\
    \ tiered\n     risers, warming trays).\n  2. There is a clear variety of different\
    \ food categories (e.g., savory, sweet,\n     fruits, beverages).\n  3. High spatial\
    \ density, where the arrangement covers the vast majority (at least\n     70%)\
    \ of the table or counter surface.\nSet to False if only isolated items are present\
    \ (e.g., a single fruit bowl, a lone\ntray), a coffee station, or a dessert-only\
    \ display.\n\n- \"confidence\": (float between 0 and 1) Your confidence level\
    \ based on the presence\nof food and tableware.\n\n- \"items_found\": (array of\
    \ strings) List the specific elements detected (e.g.,\n'food platters', 'trays',\
    \ 'bottles', 'cutlery', 'plates', 'carafes', 'chafing dishes').\n\n- \"describe\"\
    : (string) A concise description of the setup, focusing on the arrangement\nof\
    \ food, beverages, and serving equipment.\n\n\nSTRICT PROHIBITIONS:\n\n- DO NOT\
    \ mention any people present, their identity, or physical characteristics.\n\n\
    - DO NOT include any text, explanations, or markdown formatting outside of the\n\
    JSON block.\n\n- Output ONLY the raw JSON.\n\n\nExample of allowed description:\
    \ 'A long table arranged with several stainless\nsteel warming trays, stacks of\
    \ ceramic plates, and various glass bottles of water\nand juice.'\n"
- id: dog_detection
  label: Dog Detection
  prompt_single: |
    Analyze the provided image to detect the presence of a dog.

    A dog is considered DETECTED if any of the following are clearly visible in the frame:
    the full body, one or more paws, or the snout. Ambiguous or extremely partial views
    (e.g., only a tail tip or an indistinct blurred shape) do NOT qualify as a detection.

    Return your response strictly as a single JSON object with the following keys:

    - "dog_detected": (boolean) true if a dog is clearly visible (full body, paws, or snout),
      false otherwise.

    - "confidence": (float between 0 and 1) Your reliability index for the detection.
      Reflect genuine uncertainty: use values above 0.85 only when the evidence is unambiguous.
      Use values below 0.5 only when the evidence is genuinely insufficient to decide.

    - "visibility": (string) Which part of the dog is visible. Use exactly one of:
      "full_body", "partial_body", "paws_only", "snout_only", "not_visible".

    - "color": (string or null) The primary coat color(s) observed (e.g., "black",
      "golden", "white and brown", "grey brindle"). Set to null if no dog is detected.

    - "estimated_size": (string or null) The estimated size category inferred from body
      proportions relative to surrounding objects or persons:
        "small"  — toy or small breeds (e.g., Chihuahua, Dachshund, French Bulldog)
        "medium" — medium breeds (e.g., Border Collie, Labrador, Beagle)
        "large"  — large or giant breeds (e.g., German Shepherd, Great Dane, Mastiff)
      Set to null if no dog is detected or size cannot be reliably estimated.

    - "near_person": (boolean or null) true if the dog is visibly close to or in physical
      contact with a person in the frame; false if the dog appears alone with no person
      nearby; null if no dog is detected.

    - "describe": (string) A detailed description of the dog and its context. Include:
      coat color, estimated size, which body parts are visible, posture (e.g., "sitting",
      "walking", "lying down", "jumping"), and proximity to any person. If no dog is
      detected, explicitly state the scene is clear of dogs.


    STRICT PROHIBITIONS:

    - DO NOT mention the identity, gender, age, ethnicity, or physical characteristics
      of any people present.

    - DO NOT include any text, explanations, or markdown formatting outside of the
      JSON block.

    - Output ONLY the raw JSON.


    Example output (dog detected):
    {
      "dog_detected": true,
      "confidence": 0.93,
      "visibility": "full_body",
      "color": "golden",
      "estimated_size": "medium",
      "near_person": true,
      "describe": "A medium-sized golden-coated dog, consistent with a Labrador Retriever build, is standing on the floor with full body visible. The dog appears calm and is positioned directly beside a person, in close physical proximity to their legs."
    }

    Example output (no dog):
    {
      "dog_detected": false,
      "confidence": 0.97,
      "visibility": "not_visible",
      "color": null,
      "estimated_size": null,
      "near_person": null,
      "describe": "No dog is visible in the frame. The scene is clear of any canine presence."
    }
  prompt_sequence: |
    Analyze the provided sequence of frames (in chronological order) to detect the presence
    of a dog at any point during the sequence.

    A dog is considered DETECTED if any of the following are clearly visible in AT LEAST
    ONE frame: the full body, one or more paws, or the snout. Ambiguous or extremely partial
    views (e.g., only a tail tip or an indistinct blurred shape) do NOT qualify.

    Base your detection on the BEST evidence frame across the entire sequence.

    Return your response strictly as a single JSON object with the following keys:

    - "dog_detected": (boolean) true if a dog is clearly visible in at least one frame,
      false otherwise.

    - "confidence": (float between 0 and 1) Your reliability index based on the clearest
      evidence frame. Reflect genuine uncertainty: use values above 0.85 only when the
      evidence is unambiguous. Use values below 0.5 only when evidence is genuinely insufficient.

    - "visibility": (string) The best visibility achieved across all frames. Use exactly
      one of: "full_body", "partial_body", "paws_only", "snout_only", "not_visible".

    - "color": (string or null) The primary coat color(s) observed in the clearest frame
      (e.g., "black", "golden", "white and brown", "grey brindle"). Set to null if no
      dog is detected.

    - "estimated_size": (string or null) The estimated size category inferred from body
      proportions relative to surrounding objects or persons:
        "small"  — toy or small breeds (e.g., Chihuahua, Dachshund, French Bulldog)
        "medium" — medium breeds (e.g., Border Collie, Labrador, Beagle)
        "large"  — large or giant breeds (e.g., German Shepherd, Great Dane, Mastiff)
      Set to null if no dog is detected or size cannot be reliably estimated.

    - "near_person": (boolean or null) true if the dog is visibly close to or in physical
      contact with a person in any frame; false if the dog appears alone with no person
      nearby in all frames where it is visible; null if no dog is detected.

    - "describe": (string) A detailed description of the dog and its context based on the
      clearest frame(s). Include: coat color, estimated size, which body parts are visible,
      posture (e.g., "sitting", "walking", "lying down", "jumping"), movement observed
      across the sequence if applicable, and proximity to any person. If no dog is
      detected in any frame, explicitly state the scene is clear of dogs.


    STRICT PROHIBITIONS:

    - DO NOT mention the identity, gender, age, ethnicity, or physical characteristics
      of any people present.

    - DO NOT include any text, explanations, or markdown formatting outside of the
      JSON block.

    - Output ONLY the raw JSON.


    Example output (dog detected):
    {
      "dog_detected": true,
      "confidence": 0.91,
      "visibility": "full_body",
      "color": "black and white",
      "estimated_size": "medium",
      "near_person": false,
      "describe": "A medium-sized black and white dog, consistent with a Border Collie build, is visible across frames 2 through 4 walking across the scene. Full body is clearly visible. The dog moves from left to right and no person is present in any frame."
    }

    Example output (no dog):
    {
      "dog_detected": false,
      "confidence": 0.96,
      "visibility": "not_visible",
      "color": null,
      "estimated_size": null,
      "near_person": null,
      "describe": "No dog is visible in any frame of the sequence. The scene is clear of any canine presence."
    }
