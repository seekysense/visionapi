services:
  visionapi:
    build:
      context: .
      dockerfile: Dockerfile
    image: visionapi:latest
    container_name: visionapi
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      # Mutable data files mounted from host for CRUD persistence across restarts.
      # The entrypoint.sh runs as root and chowns these to appuser (UID 1001) at
      # startup so the API can write them regardless of the host file ownership.
      - ./cameras.yaml:/app/cameras.yaml
      - ./actions.yaml:/app/actions.yaml
      - ./sequences.yaml:/app/sequences.yaml
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
